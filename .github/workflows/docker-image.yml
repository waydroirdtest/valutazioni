name: Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare Docker context
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.context.outputs.should_run }}
      checkout_ref: ${{ steps.context.outputs.checkout_ref }}
      metadata_tags: ${{ steps.context.outputs.metadata_tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute Docker run context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        shell: bash
        run: |
          checkout_ref="${GITHUB_SHA}"
          git checkout --detach "$checkout_ref"

          package_version=$(node -p "require('./package.json').version")
          short_sha=$(git rev-parse --short=12 HEAD)
          should_run="true"

          if [[ "$EVENT_NAME" == "push" ]]; then
            expected_tag="v${package_version}"
            if [[ "$REF_TYPE" != "tag" ]] || [[ "$REF_NAME" != "$expected_tag" ]]; then
              echo "Skipping Docker publish because ${REF_TYPE}:${REF_NAME} does not match ${expected_tag}."
              should_run="false"
            fi
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]] && [[ "$REF_TYPE" != "tag" ]] && [[ "$REF_NAME" != "main" ]]; then
            echo "Skipping manual Docker publish outside main or a release tag."
            should_run="false"
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

          {
            echo 'metadata_tags<<EOF'
            if [[ "$REF_TYPE" == "tag" ]]; then
              echo "type=raw,value=${REF_NAME}"
              echo "type=raw,value=latest"
            else
              echo "type=raw,value=v${package_version}"
              if [[ "$REF_NAME" == "main" ]]; then
                echo "type=raw,value=latest"
              fi
            fi
            echo "type=raw,value=sha-${short_sha}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_suffix: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ needs.prepare.outputs.metadata_tags }}

      - name: Build and optionally push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_suffix }}

      - name: Export digest
        run: |
          New-Item -ItemType Directory -Force -Path digests | Out-Null
          $digest = "${{ steps.build.outputs.digest }}"
          New-Item -ItemType File -Path ("digests/" + $digest.Replace("sha256:", "")) | Out-Null
        shell: pwsh

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_suffix }}
          path: digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ needs.prepare.outputs.metadata_tags }}

      - name: Create multi-arch manifest
        run: |
          $tags = @'
          ${{ steps.meta.outputs.tags }}
          '@ -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          $digests = Get-ChildItem digests | ForEach-Object { $_.Name }
          foreach ($tag in $tags) {
            $refs = $digests | ForEach-Object { "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:$_" }
            docker buildx imagetools create --tag $tag $refs
          }
        shell: pwsh
